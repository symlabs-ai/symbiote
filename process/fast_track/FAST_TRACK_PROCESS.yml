# ForgeProcess Fast Track
# Solo dev + AI — 18 steps em 9 fases, com sprints técnicas

id: forgeprocess_fast_track
version: "0.5.0"
title: "ForgeProcess — Fast Track"
description: >
  ForgeProcess para solo dev + AI.
  18 steps, 9 fases. Gates obrigatórios: PRD validado, TDD Red-Green, Sprint Expert Gate,
  Smoke, E2E CLI, Acceptance (condicional).

target_profile:
  team_size: 1
  ai_symbiota: true
  stakeholders: optional   # acionado pelo ft_manager ao final de cada ciclo (interactive) ou no MVP (autonomous)

project_layout:
  required_dirs:
    - "process/"
    - "process/fast_track/"
    - "project/"
    - "project/docs/"
    - "src/"
    - "tests/"
    - "artifacts/"
  required_files:
    - "process/fast_track/FAST_TRACK_PROCESS.yml"
    - "process/fast_track/state/ft_state.yml"

getting_started:
  message: |
    Fast Track — Solo Dev + AI

    18 steps, valor > cerimônia, com sprints técnicas.
    Comece pela hipótese, termine com E2E passando.
  first_file:
    template: "process/fast_track/templates/template_prd.md"
    destination: "project/docs/PRD.md"
    description: "PRD consolidado — ponto de partida"
  first_command: "symforge fast-track start"

# ============================================================
# Phases & Steps (inline, sem sub_phase files)
# ============================================================

phases:
  - id: ft_mdd
    title: "MDD — Market Driven Development (comprimido)"
    narrative: "Captura hipótese, redige PRD consolidado e valida go/no-go"
    steps:
      - id: ft.mdd.01.hipotese
        title: "Capturar Hipótese"
        narrative: "Registrar contexto, sinal de mercado e oportunidade em arquivo próprio antes de evoluir para PRD"
        inputs: ["conversa com dev/stakeholder"]
        outputs: ["project/docs/hipotese.md"]
        template: "process/fast_track/templates/template_hipotese.md"
        symbiote: ft_coach

      - id: ft.mdd.02.prd
        title: "Redigir PRD"
        narrative: "Completar PRD com user stories, ACs, restrições e riscos"
        inputs: ["project/docs/hipotese.md"]
        outputs: ["project/docs/PRD.md completo"]
        template: "process/fast_track/templates/template_prd.md"
        symbiote: ft_coach

      - id: ft.mdd.03.validacao
        title: "Validar PRD"
        narrative: "Revisar PRD, decidir aprovado ou rejeitado"
        inputs: ["project/docs/PRD.md"]
        outputs: ["decisão: approved | rejected"]
        symbiote: ft_coach

  - id: ft_plan
    title: "Planning"
    narrative: "Derivar task list, sequência de sprints e diagramas técnicos do PRD"
    steps:
      - id: ft.plan.01.task_list
        title: "Criar Task List"
        narrative: "Quebrar User Stories em tasks priorizadas, estimadas e agrupadas em sprints incrementais por dependência"
        inputs: ["project/docs/PRD.md (seção 5)"]
        outputs: ["project/docs/TASK_LIST.md"]
        template: "process/fast_track/templates/template_task_list.md"
        symbiote: ft_coach

      - id: ft.plan.02.tech_stack
        title: "Propor Tech Stack"
        narrative: "forge_coder analisa PRD e propõe stack técnica inicial; ft_manager apresenta ao stakeholder para alinhamento"
        inputs: ["project/docs/PRD.md", "project/docs/TASK_LIST.md"]
        outputs: ["project/docs/tech_stack.md"]
        symbiote: forge_coder
        gate: stakeholder_approval
        frequency: "apenas no primeiro ciclo"
        mandatory_stack:
          - name: ForgeBase
            condition: always
            guides: "docs/integrations/forgebase_guides/"
          - name: Forge_LLM
            condition: "PRD contém features que acessem LLMs"
            guides: "docs/integrations/forge_llm_guides/"
        ui_design_system:
          condition: "interface_type != cli_only"
          action: "Propor 2-3 opções de design system com prós/contras; stakeholder decide"
          examples: ["Material Design / M3", "Fluent UI", "Ant Design", "Chakra UI", "shadcn/ui", "Carbon", "Tailwind UI"]
          output_section: "UI Design System em tech_stack.md"
          side_effect: "Definir interface_type em ft_state.yml"

      - id: ft.plan.03.diagrams
        title: "Gerar Diagramas Técnicos"
        narrative: "Produzir diagramas mínimos de classe, componentes, banco de dados e arquitetura em Mermaid, baseados no PRD e na stack aprovada"
        inputs: ["project/docs/PRD.md", "project/docs/TASK_LIST.md", "project/docs/tech_stack.md"]
        outputs:
          - "project/docs/diagrams/class.md"
          - "project/docs/diagrams/components.md"
          - "project/docs/diagrams/database.md"
          - "project/docs/diagrams/architecture.md"
        symbiote: forge_coder
        frequency: "uma vez no primeiro ciclo; revisado em ciclos subsequentes se houver mudança estrutural"

  - id: ft_tdd
    title: "TDD — Test Driven Development"
    narrative: "Ciclo Red-Green por task selecionada dentro da sprint atual"
    steps:
      - id: ft.tdd.01.selecao
        title: "Selecionar Task"
        narrative: "Escolher próxima task pendente do TASK_LIST.md dentro da sprint atual"
        inputs: ["project/docs/TASK_LIST.md"]
        outputs: ["task selecionada, status -> in_progress"]
        symbiote: forge_coder

      - id: ft.tdd.02.red
        title: "Red — Escrever Teste"
        narrative: "Escrever teste que falha para a task selecionada"
        inputs: ["task selecionada", "ACs da User Story"]
        outputs: ["tests/ com teste falhando"]
        symbiote: forge_coder

      - id: ft.tdd.03.green
        title: "Green — Implementar"
        narrative: "Implementar código mínimo para teste passar; garantir suite completa verde"
        inputs: ["teste falhando"]
        outputs: ["src/ com implementação", "teste passando", "suite completa verde"]
        symbiote: forge_coder

  - id: ft_delivery
    title: "Delivery"
    narrative: "Revisar, refatorar e commitar até concluir a sprint atual"
    steps:
      - id: ft.delivery.01.self_review
        title: "Self-Review (expandido)"
        narrative: "Revisar código com checklist expandido: segurança, qualidade, arquitetura Clean/Hex + ForgeBase"
        inputs: ["diff do código"]
        outputs: ["issues encontradas corrigidas"]
        symbiote: forge_coder
        checklist:
          security_hygiene:
            - "Sem secrets ou dados sensíveis no código"
            - "Sem código morto ou debug prints"
            - "Lint e type check passando"
          code_quality:
            - "Nomes claros e consistentes"
            - "Edge cases cobertos por testes"
            - "Cobertura de testes >= 85% nos arquivos alterados (desejável 90%)"
          architecture:
            - "Domínio puro: sem I/O, sem imports de infrastructure/adapters"
            - "UseCases passam por UseCaseRunner (nunca .execute() direto)"
            - "Todo UseCase novo está mapeado em forgepulse.value_tracks.yml"
            - "Diagramas atualizados se estrutura mudou (class/components/database/architecture)"

      - id: ft.delivery.02.refactor
        title: "Refactor"
        narrative: "Aplicar refactoring se self-review identificou oportunidades; no-op documentado se nada a refatorar"
        inputs: ["issues do self-review", "diff"]
        outputs: ["código refatorado", "suite verde"]
        symbiote: forge_coder

      - id: ft.delivery.03.commit
        title: "Commit"
        narrative: "Commit com mensagem padronizada referenciando task ID"
        inputs: ["código revisado"]
        outputs: ["commit no branch"]
        symbiote: forge_coder
        commit_strategy:
          default: "per_task"
          long_cycles: "squash_cycle (> 5 tasks, instruído pelo ft_manager)"
          squash_convention: "feat(cycle-XX): summary"

  - id: ft_smoke
    title: "Smoke — Validação Real do Produto"
    narrative: "Agente executa o produto real, injeta input e documenta output observado. Sem mocks. Gate antes do E2E formal."
    steps:
      - id: ft.smoke.01.cli_run
        title: "Smoke CLI Run"
        narrative: "Subir o processo real, injetar input via PTY, verificar output sem mocks de I/O e gerar pulse evidence"
        inputs: ["src/", "tests/smoke/", "forgepulse.value_tracks.yml"]
        outputs: ["project/docs/smoke-cycle-XX.md com output real documentado", "artifacts/pulse_snapshot.json"]
        gate: true
        symbiote: forge_coder
        checklist:
          - "Processo sobe sem erro"
          - "Input injetado via PTY (pexpect ou ptyprocess) — sem simulação"
          - "Output observado documentado literalmente (não inferido)"
          - "Nenhum freeze ou hang detectado no fluxo crítico"
          - "Resultado explícito: PASSOU ou TRAVOU"

  - id: ft_e2e
    title: "E2E — CLI Validation Gate"
    narrative: "Gate obrigatório: validação end-to-end via CLI. Exige unit tests E smoke passando."
    steps:
      - id: ft.e2e.01.cli_validation
        title: "E2E CLI Validation"
        narrative: "Executar validação E2E CLI-first. Gate obrigatório para encerrar ciclo."
        inputs: ["src/", "tests/unit/", "tests/smoke/"]
        outputs: ["tests/e2e/cycle-XX/ com resultados"]
        gate: true
        requires: ["ft.smoke.01.cli_run"]
        symbiote: forge_coder

  - id: ft_acceptance
    title: "Acceptance — Validação de Interface"
    narrative: "Gate condicional: validação de ACs contra a interface real (API/UI). Skip se cli_only."
    condition: "interface_type != cli_only"
    steps:
      - id: ft.acceptance.01.interface_validation
        title: "Acceptance Test — Interface Validation"
        narrative: "Mapear cada AC do PRD para teste de aceitação contra a interface real. Gerar report com rastreabilidade US→AC→Teste."
        inputs: ["project/docs/PRD.md (seção 5 — ACs)", "src/", "interface do produto"]
        outputs: ["project/docs/acceptance-cycle-XX.md", "tests/acceptance/cycle-XX/"]
        template: "process/fast_track/templates/template_acceptance_report.md"
        gate: true
        condition: "interface_type != cli_only"
        symbiote: forge_coder
        strategy_by_interface:
          api: "pytest + httpx/requests → tests/acceptance/"
          ui_web: "Playwright ou Chrome automation → tests/acceptance/"
          ui_desktop: "Playwright (Electron) ou pyautogui → tests/acceptance/"
          mixed: "AMBAS as estratégias: pytest + httpx para API E Playwright headed para UI. Ambos os conjuntos devem existir em tests/acceptance/"
          cli: "skip — coberto pelo E2E gate"

  - id: ft_feedback
    title: "Feedback"
    narrative: "Registrar aprendizados do ciclo"
    steps:
      - id: ft.feedback.01.retro_note
        title: "Retro Note"
        narrative: "Registrar o que funcionou, o que não funcionou e foco do próximo ciclo"
        inputs: ["ciclo completo"]
        outputs: ["project/docs/retro-cycle-XX.md"]
        template: "process/fast_track/templates/template_retro_note.md"
        symbiote: ft_coach

  - id: ft_audit
    title: "Auditoria ForgeBase"
    narrative: "Auditoria consolidada de ForgeBase, observabilidade, Value/Support Tracks e logging antes de declarar MVP entregue."
    steps:
      - id: ft.audit.01.forgebase
        title: "Auditoria ForgeBase"
        narrative: "Verificar wiring UseCaseRunner, completude de Value/Support Tracks, qualidade de logging e aderência Clean/Hex"
        inputs:
          - "src/"
          - "forgepulse.value_tracks.yml"
          - "artifacts/pulse_snapshot.json"
          - "project/docs/PRD.md"
        outputs:
          - "project/docs/forgebase-audit.md"
        template: "process/fast_track/templates/template_forgebase_audit.md"
        symbiote: forge_coder
        gate: true
        checklist:
          usecase_runner:
            - "Todo UseCase executado via UseCaseRunner.run(), nunca .execute() direto"
            - "Composition root usa runner para todos os endpoints"
            - "Nenhum UseCase escapa do runner"
          value_support_tracks:
            - "forgepulse.value_tracks.yml existe e completo"
            - "Todo UseCase mapeado em pelo menos 1 track"
            - "Support Tracks têm supports: referenciando value tracks"
            - "Sem track_type como campo no YAML"
          observability:
            - "pulse_snapshot.json com mapping_source: spec"
            - "Snapshot agrega por value_track (não apenas legacy)"
            - "Métricas: count, duration, success, error"
            - "Eventos: start, finish, error"
          logging:
            - "Sem print() em produção"
            - "Logs estruturados (não strings concatenadas)"
            - "Níveis corretos: DEBUG/INFO/WARNING/ERROR"
            - "Sem dados sensíveis nos logs"
            - "Sem logs excessivos em loops"
            - "Mensagens descritivas"
            - "Logger por módulo (getLogger(__name__))"
          architecture:
            - "Domínio puro: sem I/O, sem imports de infra/adapters"
            - "Ports como abstrações (ABC/Protocol)"
            - "Sem dependência circular entre camadas"

  - id: ft_handoff
    title: "Handoff — Modo Manutenção"
    narrative: "Sintetizar artefatos do MVP em SPEC.md. Ativado uma única vez, ao encerrar o projeto Fast Track."
    steps:
      - id: ft.handoff.01.specs
        title: "Gerar SPEC.md"
        narrative: "Sintetizar PRD, task list, tech stack e retro notes em documento de referência para manutenção via /feature"
        inputs:
          - "project/docs/PRD.md"
          - "project/docs/TASK_LIST.md"
          - "project/docs/tech_stack.md"
          - "project/docs/retro-cycle-*.md"
        outputs:
          - "project/docs/SPEC.md"
          - "CHANGELOG.md"
          - "BACKLOG.md"
        templates:
          - "process/fast_track/templates/template_specs.md"
          - "process/fast_track/templates/template_changelog.md"
          - "process/fast_track/templates/template_backlog.md"
        symbiote: ft_coach
        frequency: "uma vez — ao encerrar o projeto Fast Track (MVP concluído)"

# ============================================================
# Flow
# ============================================================

flow:
  - id: start
    type: start
    next: ft_bootstrap

  - id: ft_bootstrap
    type: orchestration
    orchestrator: ft_manager
    title: "Bootstrap — Git + Setup + Token Tracking"
    narrative: "Pré-requisito bloqueante: verificar git remote, rodar setup_env.sh, gravar snapshot init de tokens. Nenhuma fase inicia sem os 3 concluídos."
    action: "1) git remote -v (verificar/configurar) 2) bash setup_env.sh (ambiente) 3) token_tracker.py snapshot --step init"
    on_pass: decisao_mdd_mode
    on_fail: ft_bootstrap  # retry até resolver

  - id: decisao_mdd_mode
    type: decision
    orchestrator: ft_manager
    decision:
      question: "Stakeholder forneceu PRD abrangente de entrada?"
      decider:
        type: auto
        check: "project/docs/ has substantive product document OR stakeholder pasted PRD in conversation"
      branches:
        - when: "hyper"
          goto: ft_mdd_hyper
        - when: "normal"
          goto: ft_mdd_01

  # --- Hyper-Mode MDD ---

  - id: ft_mdd_hyper
    type: step
    title: "Hyper-Mode — Absorção e geração de artefatos"
    narrative: "ft_coach lê PRD do stakeholder, gera PRD.md, TASK_LIST.md e questionário de alinhamento"
    inputs: ["PRD fornecido pelo stakeholder"]
    outputs:
      - "project/docs/PRD.md"
      - "project/docs/TASK_LIST.md"
      - "project/docs/hyper_questionnaire.md"
    symbiote: ft_coach
    mode: hyper
    next: ft_hyper_questionnaire

  - id: ft_hyper_questionnaire
    type: stakeholder_review
    orchestrator: ft_manager
    action: "Stakeholder responde questionário (pontos ambíguos, lacunas, sugestões)"
    next: ft_hyper_incorporate

  - id: ft_hyper_incorporate
    type: step
    title: "Hyper-Mode — Incorporar respostas e finalizar artefatos"
    narrative: "ft_coach incorpora respostas, remove inferências pendentes, atualiza PRD e TASK_LIST"
    symbiote: ft_coach
    mode: hyper
    next: ft_manager_valida_prd

  # --- Normal MDD ---

  - id: ft_mdd_01
    type: step
    step_ref: ft_mdd.ft.mdd.01.hipotese
    next: ft_mdd_02

  - id: ft_mdd_02
    type: step
    step_ref: ft_mdd.ft.mdd.02.prd
    next: ft_mdd_03

  - id: ft_mdd_03
    type: step
    step_ref: ft_mdd.ft.mdd.03.validacao
    next: ft_manager_valida_prd

  - id: ft_manager_valida_prd
    type: validation
    orchestrator: ft_manager
    validator: ft_gatekeeper
    gate_id: gate.prd
    on_pass: decisao_validacao
    on_fail: ft_mdd_02

  - id: decisao_validacao
    type: decision
    decision:
      question: "O PRD foi aprovado?"
      decider:
        type: hil
        actor: ft_manager   # ft_manager valida critérios; dev/stakeholder confirma go/no-go
      branches:
        - when: "approved"
          goto: ft_plan_01
        - when: "rejected"
          goto: end_rejeitado

  - id: ft_plan_01
    type: step
    step_ref: ft_plan.ft.plan.01.task_list
    next: ft_manager_valida_task_list

  - id: ft_manager_valida_task_list
    type: validation
    orchestrator: ft_manager
    validator: ft_gatekeeper
    gate_id: gate.task_list
    on_pass: ft_stakeholder_aprova_prioridades
    on_fail: ft_plan_01

  - id: ft_stakeholder_aprova_prioridades
    type: stakeholder_review
    orchestrator: ft_manager
    action: "Apresentar prioridades da task list ao stakeholder para aprovação. Features centrais do PRD devem ser P0."
    branches:
      - when: "approved"
        goto: ft_plan_02
      - when: "adjustments_requested"
        goto: ft_plan_01

  - id: ft_plan_02
    type: step
    step_ref: ft_plan.ft.plan.02.tech_stack
    next: ft_manager_apresenta_stack
    condition: "first_cycle_only"

  - id: ft_manager_apresenta_stack
    type: stakeholder_review
    orchestrator: ft_manager
    action: "Apresentar proposta de tech stack ao stakeholder; coletar ajustes e aprovação"
    branches:
      - when: "approved"
        goto: ft_plan_03
      - when: "adjustments_requested"
        goto: ft_plan_02

  - id: ft_plan_03
    type: step
    step_ref: ft_plan.ft.plan.03.diagrams
    next: ft_sprint_prepare

  - id: ft_sprint_prepare
    type: state_update
    orchestrator: ft_manager
    action: "alinhar current_sprint com a primeira sprint pendente do escopo do ciclo; set sprint_status: in_progress"
    next: decisao_paralelo

  # --- Decisão: Paralelo ou Sequencial ---

  - id: decisao_paralelo
    type: decision
    orchestrator: ft_manager
    decision:
      question: "Executar tasks em paralelo (worktrees) ou sequencial?"
      decider:
        type: auto
        check: "parallel_mode == true AND >= 3 pending tasks in current_sprint AND forge_coder recommended PARALELO"
      branches:
        - when: "parallel"
          goto: ft_parallel_fanout
        - when: "sequential"
          goto: ft_tdd_01

  - id: ft_parallel_fanout
    type: orchestration
    orchestrator: ft_manager
    title: "Fan-out — criar worktrees e lançar agents paralelos"
    narrative: "ft_manager cria worktrees para tasks independentes, lança forge_coder em cada slot"
    action: "create worktrees, assign tasks to slots, launch parallel forge_coder instances"
    max_slots: 3
    next: ft_parallel_wait

  - id: ft_parallel_wait
    type: synchronization
    orchestrator: ft_manager
    title: "Aguardar slots paralelos"
    narrative: "ft_manager aguarda todos os slots sinalizarem done (ou failed)"
    action: "monitor parallel_tasks[].status until all == done|failed"
    next: ft_parallel_fanin

  - id: ft_parallel_fanin
    type: orchestration
    orchestrator: ft_manager
    title: "Fan-in — merge, suite, cleanup"
    narrative: "ft_manager faz merge sequencial das branches paralelas, roda suite completa, limpa worktrees"
    action: "sequential merge --no-ff, resolve conflicts, pytest, cleanup worktrees and branches"
    next: decisao_mais_tasks_pos_merge

  - id: decisao_mais_tasks_pos_merge
    type: decision
    orchestrator: ft_manager
    decision:
      question: "Há mais tasks pendentes na sprint atual após merge paralelo?"
      decider:
        type: auto
        check: "project/docs/TASK_LIST.md has pending tasks in current_sprint"
      branches:
        - when: "more_tasks"
          goto: decisao_paralelo
        - when: "done"
          goto: ft_preflight_sprint_gates

  # --- Loop: TDD + Delivery por task ---

  - id: ft_tdd_01
    type: step
    step_ref: ft_tdd.ft.tdd.01.selecao
    next: ft_tdd_02

  - id: ft_tdd_02
    type: step
    step_ref: ft_tdd.ft.tdd.02.red
    next: ft_tdd_03

  - id: ft_tdd_03
    type: step
    step_ref: ft_tdd.ft.tdd.03.green
    next: ft_delivery_01

  - id: ft_delivery_01
    type: step
    step_ref: ft_delivery.ft.delivery.01.self_review
    next: ft_delivery_02

  - id: ft_delivery_02
    type: step
    step_ref: ft_delivery.ft.delivery.02.refactor
    next: ft_delivery_03

  - id: ft_delivery_03
    type: step
    step_ref: ft_delivery.ft.delivery.03.commit
    next: ft_manager_valida_entrega

  - id: ft_manager_valida_entrega
    type: validation
    orchestrator: ft_manager
    validator: ft_gatekeeper
    gate_id: gate.delivery
    on_pass: decisao_mais_tasks
    on_fail: ft_delivery_01

  - id: decisao_mais_tasks
    type: decision
    decision:
      question: "Há mais tasks pendentes na sprint atual?"
      decider:
        type: auto
        check: "project/docs/TASK_LIST.md has pending tasks in current_sprint"
      branches:
        - when: "more_tasks"
          goto: decisao_paralelo
        - when: "done"
          goto: ft_preflight_sprint_gates

  # --- Pre-flight Gate Log Check (por sprint) ---

  - id: ft_preflight_sprint_gates
    type: validation
    orchestrator: ft_manager
    title: "Pre-flight da sprint — verificar gate_log antes do Sprint Expert Gate"
    narrative: "ft_manager verifica que todas as tasks done da sprint atual passaram gate.delivery. Bloqueia se houver gaps."
    action: "read gate_log from ft_state.yml, compare with done tasks in current_sprint"
    on_pass: ft_sprint_expert_gate
    on_fail: ft_tdd_01

  - id: ft_sprint_expert_gate
    type: orchestration
    orchestrator: ft_manager
    title: "Sprint Expert Gate — /ask fast-track"
    narrative: "Consultar o especialista do Fast Track ao final da sprint, registrar feedback e exigir correções antes de avançar."
    action: "call /ask fast-track with sprint context; save response to project/docs/sprint-review-sprint-XX.md; update sprint_review_log and sprint_status"
    next: decisao_sprint_status

  - id: decisao_sprint_status
    type: decision
    orchestrator: ft_manager
    decision:
      question: "A sprint foi aprovada sem pendências pelo Sprint Expert Gate?"
      decider:
        type: state
        check: "process/fast_track/state/ft_state.yml#sprint_status"
      branches:
        - when: "fixing"
          goto: ft_tdd_01
        - when: "completed"
          goto: decisao_proxima_sprint

  - id: decisao_proxima_sprint
    type: decision
    orchestrator: ft_manager
    decision:
      question: "Há próxima sprint no escopo do ciclo atual?"
      decider:
        type: auto
        check: "there is next pending sprint in cycle_sprint_scope"
      branches:
        - when: "next_sprint"
          goto: ft_sprint_advance
        - when: "sprints_done"
          goto: ft_preflight_gates

  - id: ft_sprint_advance
    type: state_update
    orchestrator: ft_manager
    action: "advance current_sprint to next sprint in cycle_sprint_scope; set sprint_status: in_progress"
    next: decisao_paralelo

  # --- Pre-flight Gate Log Check (ciclo) ---

  - id: ft_preflight_gates
    type: validation
    orchestrator: ft_manager
    title: "Pre-flight — verificar gate_log antes do Smoke"
    narrative: "ft_manager verifica que todas as tasks done passaram gate.delivery. Bloqueia se houver gaps."
    action: "read gate_log from ft_state.yml, compare with done tasks in TASK_LIST.md"
    on_pass: ft_smoke_01
    on_fail: ft_tdd_01  # volta para loop para executar gates faltantes

  # --- Smoke Gate ---

  - id: ft_smoke_01
    type: step
    step_ref: ft_smoke.ft.smoke.01.cli_run
    gate: true
    next: ft_e2e_01

  # --- E2E Gate ---

  - id: ft_e2e_01
    type: step
    step_ref: ft_e2e.ft.e2e.01.cli_validation
    gate: true
    next: decisao_acceptance

  - id: decisao_acceptance
    type: decision
    decision:
      question: "Produto tem interface além de CLI?"
      decider:
        type: state
        check: "process/fast_track/state/ft_state.yml#interface_type"
      branches:
        - when: "cli_only"
          goto: decisao_stakeholder_ciclo
        - when: "api|ui|mixed"
          goto: ft_acceptance_01

  - id: ft_acceptance_01
    type: step
    step_ref: ft_acceptance.ft.acceptance.01.interface_validation
    gate: true
    next: decisao_stakeholder_ciclo

  # --- Decisão de Ciclo (ft_manager) ---

  - id: decisao_stakeholder_ciclo
    type: decision
    orchestrator: ft_manager
    decision:
      question: "Apresentar ciclo ao stakeholder ou prosseguir em modo autônomo?"
      decider:
        type: state
        check: "process/fast_track/state/ft_state.yml#stakeholder_mode"
      branches:
        - when: "interactive"
          goto: ft_manager_apresenta_stakeholder
        - when: "autonomous"
          goto: ft_feedback_01

  - id: ft_manager_apresenta_stakeholder
    type: stakeholder_review
    orchestrator: ft_manager
    action: present_cycle_results
    branches:
      - when: "approved_new_cycle"
        goto: ft_feedback_01
      - when: "approved_mvp_done"
        goto: ft_manager_mvp_entregue
      - when: "continue_without_validation"
        goto: ft_manager_set_autonomous
      - when: "changes_requested"
        goto: ft_feedback_01

  - id: ft_manager_set_autonomous
    type: state_update
    orchestrator: ft_manager
    action: "set stakeholder_mode: autonomous in ft_state.yml"
    next: ft_feedback_01

  - id: ft_manager_mvp_entregue
    type: stakeholder_review
    orchestrator: ft_manager
    action: present_mvp_final_report
    next: ft_feedback_01_final

  - id: ft_feedback_01_final
    type: step
    step_ref: ft_feedback.ft.feedback.01.retro_note
    next: ft_audit_01

  # --- Auditoria ForgeBase ---

  - id: ft_audit_01
    type: step
    step_ref: ft_audit.ft.audit.01.forgebase
    gate: true
    next: ft_handoff_01

  - id: ft_handoff_01
    type: step
    step_ref: ft_handoff.ft.handoff.01.specs
    next: ft_manager_handoff_completo

  - id: ft_manager_handoff_completo
    type: state_update
    orchestrator: ft_manager
    action: "set mvp_delivered: true, maintenance_mode: true in ft_state.yml"
    next: end_completo

  # --- Feedback (ciclo normal) ---

  - id: ft_feedback_01
    type: step
    step_ref: ft_feedback.ft.feedback.01.retro_note
    next: decisao_continuar

  - id: decisao_continuar
    type: decision
    decision:
      question: "Iniciar novo ciclo ou encerrar?"
      decider:
        type: hil
        actor: ft_manager   # ft_manager decide com base no estado e modo; aciona stakeholder se necessário
      branches:
        - when: "continue"
          goto: ft_plan_01
        - when: "complete"
          goto: ft_audit_01

  # --- End nodes ---

  - id: end_completo
    type: end

  - id: end_rejeitado
    type: end

# ============================================================
# Artifacts
# ============================================================

artifacts:
  - id: hipotese
    path: "project/docs/hipotese.md"
    phase: ft_mdd
    description: "Hipótese estruturada — registrada antes de evoluir para PRD"

  - id: prd
    path: "project/docs/PRD.md"
    phase: ft_mdd
    description: "PRD consolidado (hipótese + visão + modelo + user stories)"

  - id: hyper_questionnaire
    path: "project/docs/hyper_questionnaire.md"
    phase: ft_mdd
    mode: hyper
    description: "Questionário de alinhamento gerado pelo ft_coach em hyper-mode"

  - id: task_list
    path: "project/docs/TASK_LIST.md"
    phase: ft_plan
    description: "Task list derivada das User Stories, com sequência de sprints por dependência"

  - id: sprint_review
    path: "project/docs/sprint-review-sprint-XX.md"
    phase: ft_delivery
    description: "Review da sprint via /ask fast-track, com recomendações obrigatórias e evidências de correção"

  - id: forgepulse_spec
    path: "forgepulse.value_tracks.yml"
    phase: ft_plan
    description: "Mapeamento UseCase → Value Track / Support Track para ForgeBase Pulse"

  - id: pulse_snapshot
    path: "artifacts/pulse_snapshot.json"
    phase: ft_smoke
    description: "Evidência de observabilidade gerada via ForgeBase Pulse no smoke gate"

  - id: source_code
    path: "src/"
    phase: ft_tdd
    description: "Código fonte implementado"

  - id: tests
    path: "tests/"
    phase: ft_tdd
    description: "Testes automatizados"

  - id: retro_note
    path: "project/docs/retro-cycle-XX.md"
    phase: ft_feedback
    description: "Retrospectiva do ciclo"

  - id: spec
    path: "project/docs/SPEC.md"
    phase: ft_handoff
    description: "Especificação macro do produto entregue — ponto de entrada para manutenção via /feature"
    frequency: "gerado uma vez ao encerrar Fast Track; atualizado por cada /feature done"

  - id: changelog
    path: "CHANGELOG.md"
    phase: ft_handoff
    description: "Histórico de mudanças do produto — seção MVP inicial; /feature done adiciona entradas"
    frequency: "gerado uma vez ao encerrar Fast Track; atualizado por cada /feature done"

  - id: backlog
    path: "BACKLOG.md"
    phase: ft_handoff
    description: "Fila de ideias de features futuras — populado via /backlog em maintenance mode"
    frequency: "gerado uma vez ao encerrar Fast Track; atualizado por cada /backlog e /feature done"

  - id: acceptance_report
    path: "project/docs/acceptance-cycle-XX.md"
    phase: ft_acceptance
    description: "Report de aceitação com mapeamento AC→Teste contra interface real"
    condition: "interface_type != cli_only"

  - id: forgebase_audit
    path: "project/docs/forgebase-audit.md"
    phase: ft_audit
    description: "Auditoria consolidada de ForgeBase: UseCaseRunner, Value/Support Tracks, Pulse, logging, Clean/Hex"
    template: "process/fast_track/templates/template_forgebase_audit.md"

  - id: token_metrics
    path: "project/docs/metrics.yml"
    phase: all
    description: "Snapshots de consumo de tokens por fase — gerado pelo token_tracker.py"
    tool: "process/fast_track/tools/token_tracker.py"

# ============================================================
# Symbiotas
# ============================================================

symbiotes:
  - name: ft_manager
    role: "Orquestra o processo completo, valida entregas e é o ponto de contato com o stakeholder"
    prompt_file: "process/symbiotes/ft_manager/prompt.md"
    capabilities:
      - orquestrar_processo
      - orquestrar_sprints
      - executar_sprint_expert_gate
      - validar_artefatos
      - delegar_ft_coach
      - delegar_forge_coder
      - interagir_stakeholder
      - modo_autonomo
    can_decide: true

  - name: ft_coach
    role: "Conduz MDD comprimido (PRD), planning (task list), retro e handoff (SPEC.md) — delegado pelo ft_manager"
    prompt_file: "process/symbiotes/ft_coach/prompt.md"
    capabilities:
      - conduzir_hipotese
      - redigir_prd
      - validar_prd
      - criar_task_list
      - gerar_specs
    can_decide: false

  - name: ft_gatekeeper
    role: "Validador determinístico de stage gates — PASS ou BLOCK, sem interpretação criativa"
    prompt_file: "process/symbiotes/ft_gatekeeper/prompt.md"
    capabilities:
      - validar_gate_prd
      - validar_gate_task_list
      - validar_gate_delivery
      - validar_gate_smoke
      - validar_gate_e2e
      - validar_gate_acceptance
      - validar_gate_audit
      - validar_gate_handoff
    can_decide: false

  - name: forge_coder
    role: "Implementa TDD e delivery — orquestrado pelo ft_manager"
    prompt_file: "process/symbiotes/forge_coder/prompt.md"
    capabilities:
      - selecionar_task
      - escrever_testes
      - implementar_codigo
      - self_review
      - refactor
      - commit
      - e2e_validation
      - acceptance_validation
    can_decide: false

# ============================================================
# Quality Metrics
# ============================================================

quality_metrics:
  - name: sprint_expert_gate
    target: "100% das sprints do escopo com sprint-review PASS e recomendações tratadas"
    description: "Nenhuma sprint avança sem /ask fast-track, report salvo e pendências zeradas"
    mandatory: true

  - name: e2e_cli_gate
    target: "tests/e2e/cycle-XX/ criado e run-all.sh executado com sucesso"
    description: "Gate obrigatório: E2E CLI-first deve passar antes de encerrar ciclo"
    mandatory: true

  - name: tdd_coverage
    target: ">= 1 teste por task implementada"
    description: "Cada task deve ter pelo menos um teste automatizado"

  - name: test_coverage
    target: ">= 85% nos arquivos alterados (desejável 90%)"
    description: "Cobertura mínima validada com --cov no self-review"
    mandatory: true

  - name: acceptance_gate
    target: "100% dos ACs do PRD cobertos por testes de aceitação contra interface real"
    description: "Gate condicional: obrigatório quando interface_type != cli_only"
    mandatory: true
    condition: "interface_type != cli_only"

  - name: prd_completeness
    target: "Seções 1-5 do PRD preenchidas antes de iniciar planning"
    description: "PRD deve cobrir hipótese, visão, modelo, métricas e user stories"
