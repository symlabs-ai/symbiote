name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: linux
    steps:
      - name: Pull latest code
        run: |
          cd ~/staging/repos/symbiote
          git pull origin main

      - name: Rebuild and deploy
        run: |
          cd ~/staging
          export SYMBIOTE_GIT_COMMIT=$(git -C ./repos/symbiote rev-parse HEAD)
          echo "Building symbiote at $SYMBIOTE_GIT_COMMIT"
          docker compose build --quiet symbiote
          docker compose up -d symbiote

      - name: Health check
        run: |
          sleep 10
          curl -sf http://localhost:8008/health > /dev/null
          echo "Health check passed"
