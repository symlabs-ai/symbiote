<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbiote Chat — Basic Example</title>
  <style>
    /* Host app theme (dark) */
    :root {
      --primary: #3B82F6;
      --primary-hover: #2563eb;
      --bg: #18181b;
      --bg-secondary: #27272a;
      --border: #3f3f46;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --text-primary: #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; }
    code { background: var(--bg-secondary); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Symbiote Chat — Basic Example</h1>
  <p>Click the FAB button in the bottom-right corner to open the chat panel.</p>
  <p>This example uses a <code>MockAdapter</code> with SSE streaming and real-time tool badges.</p>

  <!-- The component: one tag, fully configured via attributes -->
  <symbiote-chat
    name="Echo Bot"
    placeholder="Type something..."
    greeting="Hi! I'm Echo Bot."
    greeting-sub="I'll repeat what you say and show tool badge examples."
    session-key="example-basic"
    fab-label="Chat"
  ></symbiote-chat>

  <script src="../dist/symbiote-chat.js"></script>
  <script>
    const chat = document.querySelector('symbiote-chat');

    // ── Mock SSE helper: creates a fake Response with a ReadableStream ──
    function mockSSEResponse(events) {
      const encoder = new TextEncoder();
      let idx = 0;
      const stream = new ReadableStream({
        async pull(controller) {
          if (idx >= events.length) {
            controller.close();
            return;
          }
          const { event, data, delay } = events[idx++];
          if (delay) await new Promise(r => setTimeout(r, delay));
          const chunk = `event:${event}\ndata:${JSON.stringify(data)}\n\n`;
          controller.enqueue(encoder.encode(chunk));
        }
      });
      return new Response(stream, { status: 200, headers: { 'Content-Type': 'text/event-stream' } });
    }

    // ── Mock adapter — simulates SSE streaming + falls back to sync ──
    chat.adapter = {
      _history: [],

      // Streaming adapter method
      async sendMessageStream(message, context) {
        // Build the SSE event sequence based on the message
        const events = [];
        const lc = message.toLowerCase();

        if (lc.includes('tool') || lc.includes('stream')) {
          events.push({ event: 'tool_start', data: { tool_id: 'search_items', name: 'Search Items', detail: 'Searching...' }, delay: 200 });
          events.push({ event: 'text_delta', data: { text: 'Searching ' }, delay: 300 });
          events.push({ event: 'text_delta', data: { text: 'your items' }, delay: 150 });
          events.push({ event: 'tool_done', data: { tool_id: 'search_items', name: 'Search Items', success: true, result_count: 3 }, delay: 400 });
          events.push({ event: 'tool_start', data: { tool_id: 'list_journals', name: 'List Journals' }, delay: 100 });
          events.push({ event: 'text_delta', data: { text: '...\n\n' }, delay: 200 });
          events.push({ event: 'tool_done', data: { tool_id: 'list_journals', name: 'List Journals', success: true, result_count: 2 }, delay: 500 });
          events.push({ event: 'text_delta', data: { text: 'Found **3 items** and **2 journals**. ' }, delay: 150 });
          events.push({ event: 'text_delta', data: { text: 'Here are your results!' }, delay: 100 });
        } else if (lc.includes('error')) {
          events.push({ event: 'tool_start', data: { tool_id: 'delete_item', name: 'Delete Item', detail: 'Deleting...' }, delay: 200 });
          events.push({ event: 'text_delta', data: { text: 'Trying to delete' }, delay: 300 });
          events.push({ event: 'tool_done', data: { tool_id: 'delete_item', name: 'Delete Item', success: false, error: 'Permission denied' }, delay: 600 });
          events.push({ event: 'text_delta', data: { text: '...\n\nCould not delete: **permission denied**.' }, delay: 200 });
        } else {
          // Simple text streaming
          const words = `You said: **${message}**\n\nI received ${(context || '').length} chars of context.`.split(' ');
          words.forEach((w, i) => {
            events.push({ event: 'text_delta', data: { text: (i > 0 ? ' ' : '') + w }, delay: 60 });
          });
        }

        events.push({ event: 'response_done', data: {
          suggestions: ['Tell me more', 'Show streaming tools', 'Simulate error']
        }, delay: 100 });

        // Intercept fetch to return mock SSE
        const realFetch = window.fetch;
        window.fetch = async (url, opts) => {
          if (url === '/__mock_sse__') {
            window.fetch = realFetch;
            return mockSSEResponse(events);
          }
          return realFetch(url, opts);
        };

        return { url: '/__mock_sse__' };
      },

      async loadHistory(sessionKey) {
        return { messages: [...this._history] };
      },

      async clearHistory(sessionKey) {
        this._history = [];
      },
    };

    // Initial suggestions
    chat.initialSuggestions = [
      { label: 'Say hello', message: 'Hello!' },
      { label: 'Show tools', message: 'Show me a tool example' },
      { label: 'Trigger error', message: 'Show an error badge' },
    ];

    // Context provider
    chat.contextProvider = () => {
      return `Page title: ${document.title}\nURL: ${window.location.href}`;
    };

    // Listen to events
    chat.addEventListener('symbiote-message-sent', e => {
      console.log('[event] message sent:', e.detail.message);
    });
    chat.addEventListener('symbiote-message-received', e => {
      console.log('[event] message received:', e.detail);
    });
  </script>
</body>
</html>
